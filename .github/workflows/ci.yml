name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python engine ──────────────────────────────────────────────────────────
  python-engine:
    name: Python Engine (pytest + proto stubs)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install engine dependencies
        working-directory: engine
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch for CI (no GPU)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # Install JAX CPU
          pip install jax[cpu]
          # Install remaining dependencies (excluding cuda extras)
          pip install -e ".[dev]" --no-deps || pip install \
            grpcio grpcio-tools grpcio-reflection protobuf \
            numpy scipy scikit-learn xgboost \
            pydantic pydantic-settings loguru tqdm rich click \
            h5py pyarrow matplotlib \
            sqlalchemy alembic \
            cryptography \
            ollama \
            pytest pytest-asyncio

      - name: Generate gRPC Python stubs from proto files
        working-directory: engine/physicsflow
        run: |
          python -m grpc_tools.protoc \
            -I proto \
            --python_out=proto \
            --grpc_python_out=proto \
            proto/simulation.proto proto/history_matching.proto proto/agent.proto
          # Fix relative imports in generated stubs
          for f in proto/*_pb2_grpc.py; do
            sed -i 's/^import \(.*_pb2\)/from . import \1/' "$f" || true
          done

      - name: Verify proto stubs were generated
        run: |
          ls -la engine/physicsflow/proto/
          test -f engine/physicsflow/proto/simulation_pb2.py
          test -f engine/physicsflow/proto/history_matching_pb2.py
          test -f engine/physicsflow/proto/agent_pb2.py

      - name: Run unit tests
        working-directory: engine
        run: |
          pytest tests/ -v \
            -m "not slow and not gpu and not jax" \
            --tb=short \
            --junit-xml=test-results/pytest.xml \
            --cov=physicsflow \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: engine/test-results/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: engine/test-results/coverage.xml
          flags: python-engine

  # ── .NET desktop ───────────────────────────────────────────────────────────
  dotnet-desktop:
    name: .NET Desktop (build + dotnet test)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        working-directory: desktop
        run: dotnet restore PhysicsFlow.sln

      - name: Build solution (Release)
        working-directory: desktop
        run: |
          dotnet build PhysicsFlow.sln \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Verify gRPC stubs generated by Grpc.Tools
        working-directory: desktop
        run: |
          # Grpc.Tools auto-generates .cs stubs during dotnet build
          # Verify the generated files exist in obj/
          $stubs = Get-ChildItem -Recurse -Filter "*Grpc.cs" obj/
          if ($stubs.Count -eq 0) {
            Write-Warning "No gRPC stubs found in obj/ — Grpc.Tools may not have run"
          } else {
            Write-Host "Found $($stubs.Count) generated gRPC stub file(s)"
            $stubs | ForEach-Object { Write-Host "  $_" }
          }

      - name: Run .NET tests
        working-directory: desktop
        run: |
          dotnet test PhysicsFlow.sln \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults/ \
        continue-on-error: true   # tests project not yet present — skip gracefully

      - name: Upload .NET test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: desktop/TestResults/

  # ── Lint & type-check ──────────────────────────────────────────────────────
  lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy types-requests

      - name: Run ruff linter
        working-directory: engine
        run: ruff check physicsflow/ --output-format=github

      - name: Run ruff formatter check
        working-directory: engine
        run: ruff format physicsflow/ --check

  # ── Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (Python security linter)
        working-directory: engine
        run: bandit -r physicsflow/ -ll -x physicsflow/proto/
        continue-on-error: true

      - name: Run pip-audit
        working-directory: engine
        run: pip-audit --requirement <(pip freeze) --ignore-vuln GHSA-placeholder || true
        continue-on-error: true
