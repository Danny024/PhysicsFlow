name: Release

on:
  push:
    tags:
      - "v*.*.*"   # Trigger on version tags e.g. v1.2.0

jobs:
  # ── Build WiX MSI installer ────────────────────────────────────────────────
  build-installer:
    name: Build WiX v4 Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX v4 global tool
        run: dotnet tool install --global wix --version 4.*

      - name: Install WiX extensions
        run: |
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Bal.wixext
          wix extension add WixToolset.NetFx.wixext

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish .NET desktop app (self-contained x64)
        working-directory: desktop
        run: |
          dotnet publish src/PhysicsFlow.App/PhysicsFlow.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish/ `
            /p:PublishSingleFile=false `
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Build MSI
        working-directory: installer
        run: |
          wix build PhysicsFlow.wxs `
            -out "PhysicsFlow-Setup-${{ steps.version.outputs.VERSION }}-x64.msi" `
            -d "ProductVersion=${{ steps.version.outputs.VERSION }}" `
            -d "PublishDir=..\desktop\publish"

      - name: Build bootstrapper bundle (EXE)
        working-directory: installer
        run: |
          wix build PhysicsFlow.Bundle.wxs `
            -out "PhysicsFlow-Installer-${{ steps.version.outputs.VERSION }}-x64.exe" `
            -d "ProductVersion=${{ steps.version.outputs.VERSION }}" `
            -d "MsiPath=PhysicsFlow-Setup-${{ steps.version.outputs.VERSION }}-x64.msi"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ steps.version.outputs.VERSION }}
          path: |
            installer/*.msi
            installer/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhysicsFlow ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            installer/PhysicsFlow-Setup-${{ steps.version.outputs.VERSION }}-x64.msi
            installer/PhysicsFlow-Installer-${{ steps.version.outputs.VERSION }}-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish Python package to PyPI (optional) ─────────────────────────────
  publish-python:
    name: Publish Python engine to PyPI
    runs-on: ubuntu-latest
    needs: build-installer
    if: "!contains(github.ref_name, '-rc')"
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build Python wheel
        working-directory: engine
        run: python -m build

      - name: Publish to PyPI
        working-directory: engine
        run: twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        continue-on-error: true   # Don't fail the release if PyPI publish fails
