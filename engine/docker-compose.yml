## PhysicsFlow v2.0 — Single-user on-premise stack (SQLite)
##
## Usage:
##   docker compose up -d
##   docker compose logs -f physicsflow
##
## The engine listens on:
##   - gRPC:  localhost:50051
##   - REST:  http://localhost:8000  (Swagger UI at /docs)
##   - Ollama: http://localhost:11434

version: "3.9"

services:

  # ── AI model server (local LLM) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: physicsflow-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── PhysicsFlow engine ───────────────────────────────────────────────────────
  physicsflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: physicsflow-engine
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "50051:50051"   # gRPC
      - "8000:8000"     # REST API
    volumes:
      - pf_data:/data
      - ./physicsflow:/app/physicsflow:ro    # live-reload source (dev only)
    environment:
      # Database — SQLite (default single-user)
      PHYSICSFLOW_DB_PATH: /data/db/physicsflow.db
      # REST API
      PHYSICSFLOW_REST_ENABLED: "true"
      PHYSICSFLOW_REST_PORT: "8000"
      PHYSICSFLOW_REST_HOST: "0.0.0.0"
      PHYSICSFLOW_REST_API_KEY: ""          # empty = no auth (LAN-only mode)
      PHYSICSFLOW_REST_CORS_ORIGINS: '["http://localhost:8888","http://localhost:3000"]'
      # Paths
      PHYSICSFLOW_PROJECTS_DIR: /data/projects
      PHYSICSFLOW_MODELS_DIR: /data/models
      # LLM
      PHYSICSFLOW_OLLAMA_HOST: http://ollama:11434
      PHYSICSFLOW_DEFAULT_LLM_MODEL: llama3.1
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  pf_data:
  ollama_data:
